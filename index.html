<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The PvP League</title>

<link rel="icon" type="image/png" href="https://i.imgur.com/9i85Nli.png">

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="page">


<header>

    <h1>The PvP League</h1>

    <div class="info">

        <span class="waiting">
            Waiting
        </span>

        <span>
            16 / 16 Entries
        </span>

    </div>

</header>



<div class="titles">

    <div>Round 1</div>

    <div>Quarter Finals</div>

    <div>Semi Finals</div>

    <div>Final</div>

</div>




<div class="bracket">


<!-- ROUND 1 -->

<div class="round round1" id="round1"></div>



<!-- QUARTERS -->

<div class="round quarter" id="quarter"></div>



<!-- SEMIS -->

<div class="round semi" id="semi"></div>



<!-- FINAL -->

<div class="round final" id="final"></div>



</div>




<script src="script.js"></script>


</body>

</html>
